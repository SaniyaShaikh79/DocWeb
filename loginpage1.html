<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Login - DocWeb</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
:root {
    --primary: #4f46e5;
    --accent: #22c55e;
    --bg-light: #f8fafc;
    --bg-section: #f1f5f9;
    --text-dark: #0f172a;
    --text-muted: #64748b;
    --border: #e5e7eb;
    --card: #ffffff;
    --shadow: 0 10px 25px rgba(0,0,0,0.06);
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Inter', sans-serif;
    color: var(--text-dark);
    background: var(--bg-light);
    line-height: 1.7;
}

/* HEADER */
header {
    background: #ffffff;
    border-bottom: 1px solid var(--border);
    position: fixed;
    width: 100%;
    top: 0;
    z-index: 100;
    animation: slideDown 0.5s ease-out;
}

@keyframes slideDown {
    from { transform: translateY(-100%); }
    to { transform: translateY(0); }
}

nav {
    max-width: 1200px;
    margin: auto;
    padding: 1.2rem 2rem;
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.logo {
    font-size: 1.6rem;
    font-weight: 800;
    color: var(--primary);
}

.nav-links {
    list-style: none;
    display: flex;
    gap: 2rem;
    align-items: center;
}

.nav-links a {
    text-decoration: none;
    color: var(--text-dark);
    font-weight: 500;
    transition: color 0.3s ease;
}

.nav-links a:hover {
    color: var(--primary);
}

.login-btn {
    background: var(--primary);
    color: #ffffff;
    padding: 0.5rem 1.5rem;
    border-radius: 8px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    transition: background 0.3s ease;
}

.login-btn:hover {
    background: #4338ca;
}

/* LOGIN SECTION */
.login-section {
    padding: 140px 2rem 100px;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

.login-container {
    background: var(--card);
    padding: 3rem;
    border-radius: 16px;
    box-shadow: var(--shadow);
    width: 100%;
    max-width: 400px;
    text-align: center;
}

.login-container h2 {
    font-size: 2rem;
    font-weight: 800;
    margin-bottom: 2rem;
}

.login-form {
    display: flex;
    flex-direction: column;
    gap: 1.5rem;
}

.login-form input {
    padding: 0.9rem;
    border-radius: 8px;
    border: 1px solid var(--border);
    font-size: 1rem;
}

.login-form input:focus {
    border-color: var(--primary);
    outline: none;
}

.btn-login {
    background: var(--primary);
    color: #ffffff;
    padding: 0.9rem;
    border-radius: 8px;
    font-weight: 600;
    border: none;
    cursor: pointer;
}

.btn-login:hover {
    background: #4338ca;
}

.error-message {
    color: #dc2626;
    font-size: 0.9rem;
    margin-top: 1rem;
    display: none;
}

/* FOOTER */
footer {
    background: #ffffff;
    border-top: 1px solid var(--border);
    padding: 3rem 2rem;
    text-align: center;
    color: var(--text-muted);
}
</style>
</head>

<body>

<header>
    <nav>
        <div class="logo">DocWeb</div>
        <ul class="nav-links">
            <li><a href="index.html">Home</a></li>
            <li><a href="index.html#get-started">Get Started</a></li>
            <li><a href="index.html#contact-us">Contact us</a></li>
            <li><button class="login-btn">Login</button></li>
        </ul>
    </nav>
</header>

<section class="login-section">
    <div class="login-container">
        <h2>Welcome Back</h2>

        <form class="login-form" id="loginForm">
            <input type="email" id="email" placeholder="Email Address" required />
            <input type="password" id="password" placeholder="Password" required />
            <button type="submit" class="btn-login">Login</button>
            <div class="error-message" id="errorMessage">
                Invalid email or password.
            </div>
        </form>
    </div>
</section>

<footer>
    © 2026 DocWeb. All rights reserved.
</footer>

<script>
document.getElementById("loginForm").addEventListener("submit", function(e) {
    e.preventDefault();

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;
    const errorMessage = document.getElementById("errorMessage");

    // Simple demo validation
    if(email === "admin@docweb.com" && password === "123456") {
        alert("Login successful!");
        errorMessage.style.display = "none";
    } else {
        errorMessage.style.display = "block";
    }
});
</script>

</body>
</html>
